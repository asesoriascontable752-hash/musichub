<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MusicHub</title>
  <style>
    body { background: #121212; color: #fff; font-family: sans-serif;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; flex-direction: column; gap: 12px; }
    .dot { width: 12px; height: 12px; background: #1DB954; border-radius: 50%;
           animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
  </style>
</head>
<body>
  <div class="dot"></div>
  <p style="color:#b3b3b3;font-size:14px">Cargando MusicHub...</p>
</body>
</html>
